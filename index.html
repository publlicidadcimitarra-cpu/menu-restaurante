<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* CONTENEDOR PRINCIPAL */

.menu-libro{
display:flex;
overflow-x:scroll;
scroll-snap-type:x mandatory;
width:100vw;
height:100vh;
}

/* OCULTAR SCROLL */

.menu-libro::-webkit-scrollbar{
display:none;
}

/* PAGINAS */

.pagina{
flex:0 0 100%;
width:100vw;
height:100vh;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

/* IMAGEN */

.pagina img{
width:100%;
height:100%;
object-fit:contain;
}

</style>
</head>

<body>

<div class="menu-libro">

<!-- LOGO -->
<div class="pagina">
<img src="logo.png">
</div>
